{{- if not .Values.agent.skipUpgradeMatrixCheck }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datafy-upgrade-preflight-sa
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    "argocd.argoproj.io/sync-wave": "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datafy-upgrade-preflight-role
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    "argocd.argoproj.io/sync-wave": "-10"
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datafy-upgrade-preflight-binding
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    "argocd.argoproj.io/sync-wave": "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datafy-upgrade-preflight-role
subjects:
  - kind: ServiceAccount
    name: datafy-upgrade-preflight-sa
    namespace: {{ .Release.Namespace | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: datafy-upgrade-preflight
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "argocd.argoproj.io/hook": PreSync
    "argocd.argoproj.io/hook-delete-policy": BeforeHookCreation,HookSucceeded
    "argocd.argoproj.io/sync-wave": "-5"
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "datafy-agent.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: datafy-upgrade-preflight-sa
      restartPolicy: Never
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: upgrade-matrix-check
          image: "{{ .Values.agent.image.repository }}:{{ include "datafy-agent.agentImageTag" . }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          env:
            - name: TARGET_VERSION
              value: {{ include "datafy-agent.agentImageTag" . | quote }}
            - name: AGENT_MODE
              value: {{ include "datafy-agent.agentModeNormalized" . | quote }}
            - name: DOWNLOAD_URL
              value: {{ include "datafy-agent.downloadUrl" . | quote }}
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: DAEMONSET_NAME
              value: "datafy-agent"
            {{- include "datafy-agent.proxyEnv" . | trim | nindent 12 }}
          command:
            - /bin/bash
            - -ec
            - |
              {{- (.Files.Get "files/upgrade-preflight.sh") | nindent 14 }}
{{- end }}
