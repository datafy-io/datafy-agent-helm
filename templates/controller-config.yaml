{{- if eq (include "datafy-agent.extendedInstallEnabled" .) "true" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: datafy-controller-config
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  config.yaml: |
    ebs_csi:
      controller:
        deployment_name: {{ include "datafy-agent.ebsCsiControllerDeploymentName" . }}
        app_name: {{ include "datafy-agent.ebsCsiControllerAppName" . }}
        role_name: {{ if .Values.gardener.enabled }}controller{{ else }}{{ end }}
      node:
        daemonset_name: {{ include "datafy-agent.ebsCsiNodeDaemonSetName" . }}
        app_name: {{ include "datafy-agent.ebsCsiNodeAppName" . }}
        role_name: {{ if .Values.gardener.enabled }}disk-driver{{ else }}{{ end }}
    csi_proxy:
      {{- with .Values.ebsCsiProxy.image }}
      image:
        pullPolicy: {{ .pullPolicy }}
        repository: {{ .repository }}
        tag: {{ include "datafy-agent.ebsCsiProxyImageTag" $ }}
      {{- end }}
      {{- with .Values.ebsCsiProxy.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      controller:
        service_address: {{ printf "datafy-controller.%s:50051" .Release.Namespace | quote }}
{{- end }}
