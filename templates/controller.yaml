{{- if eq (include "datafy-agent.extendedInstallEnabled" .) "true" }}
{{- $configChecksum := include (print $.Template.BasePath "/controller-config.yaml") . | sha256sum}}
{{- $datafyTokenChecksum := include (print $.Template.BasePath "/datafy-token.yaml") . | sha256sum }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datafy-controller
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.controller.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: datafy-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datafy-controller
      annotations:
        checksum/controller-config: {{ $configChecksum }}
        checksum/datafy-token-secret: {{ $datafyTokenChecksum }}
    spec:
      serviceAccountName: {{ .Values.controller.serviceAccount.name }}
      priorityClassName: system-node-critical
      schedulerName: default-scheduler
      restartPolicy: Always
      hostPID: true
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range .Values.imagePullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      {{- if .Values.controller.affinity }}
      affinity:
        {{- toYaml .Values.controller.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.controller.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.controller.tolerations }}
      tolerations:
        {{- toYaml .Values.controller.tolerations | nindent 8 }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: datafy-controller
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ include "datafy-agent.controllerImageTag" . }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          {{- if .Values.controller.securityContext }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          {{- end }}
          env:
            - name: DATAFY_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATAFY_TRANSPARENT_MODE_ENABLED
              value: {{ false | quote }}
            - name: DATAFY_TOKEN_SECRET_NAME
              value: {{ include "datafy-agent.tokenSecretName" . | quote }}
            - name: DATAFY_TOKEN_SECRET_KEY
              value: {{ include "datafy-agent.tokenSecretKey" . | quote }}
            - name: DATAFY_TOKEN_EXTERNAL_ENABLED
              value: {{ (eq (include "datafy-agent.tokenMode" .) "external") | quote }}
            - name: DATAFY_TOKEN_TOKENLESS_ENABLED
              value: {{ (eq (include "datafy-agent.tokenMode" .) "role") | quote }}
            - name: DATAFY_IAC_URL
              value: {{ .Values.agent.dsoUrl | replace "wss://dso" "https://iac" | replace "ws://dso" "http://iac" }}
            - name: DATAFY_AGENT_MODE
              value: {{ (include "datafy-agent.agentModeNormalized" . ) | quote }}
            - name: DATAFY_VOLUME_REPLACEMENTS
              valueFrom:
                configMapKeyRef:
                  name: datafy-volume-replacements
                  key: replacements
            - name: DATAFY_CONFIG_FILE
              value: /etc/datafy-controller/config.yaml
            - name: DATAFY_CONFIG_CHECKSUM
              value: {{ $configChecksum | quote }}
            - name: DATAFY_WEBHOOK_CERT_DIR
              value: /etc/datafy-controller/tls
            {{- include "datafy-agent.proxyEnv" . | trim | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 40Mi
          ports:
            - name: webhook
              containerPort: 9443
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          {{- if .Values.controller.health.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.controller.health.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.controller.health.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.controller.health.livenessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.controller.health.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.controller.health.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.controller.health.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.controller.health.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.controller.health.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.controller.health.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.controller.health.readinessProbe.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: datafy-controller-config
              mountPath: /etc/datafy-controller
              readOnly: true
            - name: datafy-controller-webhook-tls
              mountPath: /etc/datafy-controller/tls
              readOnly: true
            - name: datafy-token
              mountPath: /etc/datafy-controller/token
              readOnly: true
      volumes:
        - name: datafy-controller-config
          configMap:
            name: datafy-controller-config
        - name: datafy-controller-webhook-tls
          secret:
            secretName: datafy-controller-webhook-tls
        - name: datafy-token
          secret:
            secretName: {{ include "datafy-agent.tokenSecretName" . }}
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: datafy-controller-webhook
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app.kubernetes.io/name: datafy-controller
  ports:
    - name: https
      port: 443
      targetPort: webhook
---
apiVersion: v1
kind: Service
metadata:
  name: datafy-controller
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    app.kubernetes.io/name: datafy-controller
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      appProtocol: grpc
{{- end }}
