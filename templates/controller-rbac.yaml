{{- if eq (include "datafy-agent.extendedInstallEnabled" .) "true" }}
{{- $roleName := "datafy-controller-role" -}}
{{- $roleBindingName := "datafy-controller-binding" -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.controller.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false
  {{- if eq (include "datafy-agent.tokenMode" .) "irsa" }}
    eks.amazonaws.com/role-arn: {{ .Values.controller.serviceAccount.roleArn | quote }}
  {{- end }}
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $roleName }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  # Core API group ""
  - apiGroups: [ "" ]
    resources: [ "configmaps", "secrets", "serviceaccounts" ]
    verbs: [ "list", "watch" ]
  - apiGroups: [ "" ]
    resources: [ "persistentvolumes" ]
    verbs: [ "list", "watch", "patch" ]
  - apiGroups: [ "" ]
    resources: [ "persistentvolumeclaims" ]
    verbs: [ "list", "watch" ]
  - apiGroups: [ "" ]
    resources: [ "secrets", "configmaps" ]
    verbs: [ "create" ] # Create cannot be constrained by resourceNames because the name is not known until creation time.
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    resourceNames:
      {{- if ne (include "datafy-agent.tokenMode" .) "external" }}
      - "datafy-token" # Chart owns this secret (static/irsa mode); the controller updates it. In external mode the customer owns the secret and the controller gets no write access.
      {{- end }}
      - "datafy-controller-webhook-tls"
    verbs: [ "get", "update", "patch", "delete" ]
  - apiGroups: [ "" ]
    resources: [ "configmaps" ]
    resourceNames: [ "datafy-volume-replacements", "datafy-controller-config" ]
    verbs: [ "get", "update", "patch", "delete" ]
  - apiGroups: [ "" ]
    resources: [ "services" ]
    resourceNames: [ "datafy-controller", "datafy-controller-webhook" ]
    verbs: [ "get", "update", "patch", "delete" ]
  - apiGroups: [ "" ]
    resources: [ "nodes" ]
    verbs: [ "get", "list", "watch", "patch" ]
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get", "list", "watch", "delete" ]
  - apiGroups: [ "" ]
    resources: [ "serviceaccounts" ]
    resourceNames: [ {{ .Values.controller.serviceAccountName | quote }} ]
    verbs: [ "get", "update", "patch" ]

  # apps API group
  - apiGroups: [ "apps" ]
    resources: [ "deployments", "daemonsets" ]
    verbs: [ "list", "watch" ]
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    resourceNames: [ "ebs-csi-controller" ]
    verbs: [ "get", "update", "patch" ]
  - apiGroups: [ "apps" ]
    resources: [ "daemonsets" ]
    resourceNames: [ "ebs-csi-node" ]
    verbs: [ "get", "update", "patch" ]
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    resourceNames: [ "datafy-controller" ]
    verbs: [ "get", "update", "patch", "delete" ]

  # rbac.authorization.k8s.io API group
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "clusterroles", "clusterrolebindings" ]
    verbs: [ "list", "watch" ]
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "clusterroles" ]
    resourceNames: [ {{ $roleName | quote }} ]
    verbs: [ "get", "update", "delete", "patch" ]
  - apiGroups: [ "rbac.authorization.k8s.io" ]
    resources: [ "clusterrolebindings" ]
    resourceNames: [ {{ $roleBindingName | quote }} ]
    verbs: [ "get", "update", "delete", "patch" ]

  # admissionregistration.k8s.io API group
  - apiGroups: [ "admissionregistration.k8s.io" ]
    resources: [ "mutatingwebhookconfigurations" ]
    resourceNames: [ "datafy-controller-webhook" ]
    verbs: [ "get", "update", "patch", "delete" ]

  # coordination.k8s.io API group
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "list", "watch" ]
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    verbs: [ "create" ]
  - apiGroups: [ "coordination.k8s.io" ]
    resources: [ "leases" ]
    resourceNames: [ "datafy-controller-leader" ]
    verbs: [ "get", "update", "patch", "delete" ]

  # events API groups
  - apiGroups: [ "", "events.k8s.io" ]
    resources: [ "events" ]
    verbs: [ "create", "patch", "update" ]

  # snapshots API group
  - apiGroups: [ "snapshot.storage.k8s.io" ]
    resources: [ "volumesnapshots" ]
    verbs: [ "get" ]
  - apiGroups: [ "snapshot.storage.k8s.io" ]
    resources: [ "volumesnapshots/status" ]
    verbs: [ "update", "patch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $roleBindingName }}
  labels:
  {{- include "datafy-agent.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Delete=false
  {{- with .Values.extraAnnotations }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $roleName }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.controller.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
