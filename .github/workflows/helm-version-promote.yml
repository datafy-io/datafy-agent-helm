name: Helm Chart App Version

on:
  workflow_call:
    inputs:
      agent_version:
        description: "New agent version (optional)"
        required: false
        type: string
      csi_version:
        description: "New CSI proxy version (optional)"
        required: false
        type: string
      no_release:
        description: "If true, skip the release job"
        required: false
        type: boolean

  workflow_dispatch:
    inputs:
      agent_version:
        description: "New agent version (optional)"
        required: false
        type: string
      csi_version:
        description: "New CSI proxy version (optional)"
        required: false
        type: string        
      no_release:
        description: "If true, skip the release job"
        required: false
        type: boolean

permissions:
  contents: write
  
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: datafy-io/datafy-agent-helm
          ref: test-external-update

      - name: Read current appVersion
        id: read_chart_app_version_and_update
        run: |
          CURRENT_APP_VERSION=$(yq '.appVersion' Chart.yaml)
          echo "Current appVersion: $CURRENT_APP_VERSION"

          agent="${{ inputs.agent_version }}"
          csi="${{ inputs.csi_version }}"

          if [ -z "$agent" ] && [ -z "$csi" ]; then
            echo "No input versions provided. Exiting."
            exit 1
          fi

          agent_part=$(echo "$CURRENT_APP_VERSION" | cut -d'_' -f1)
          csi_part=$(echo "$CURRENT_APP_VERSION" | cut -d'_' -f2)
          if [ -n "$agent" ]; then agent_part="$agent"; fi
          if [ -n "$csi" ]; then csi_part="$csi"; fi

          NEW_APP_VERSION="${agent_part}_${csi_part}"
          echo "New appVersion=${NEW_APP_VERSION}"
          echo "new_app_version=${NEW_APP_VERSION}" >> $GITHUB_OUTPUT
          
          yq -i ".appVersion = \"${NEW_APP_VERSION}\"" Chart.yaml


      - name: Read current chart version & update Chart.yaml
        id: read_chart_version_and_update
        run: |
          current_chart_version=$(yq '.version' Chart.yaml)
          echo "current chart version=$current_chart_version"

          IFS='.' read -r -a CHART_PARTS <<< "$(grep '^version:' Chart.yaml | awk '{print $2}')"
          CHART_PARTS[2]=$((CHART_PARTS[2] + 1))
          NEW_CHART_VERSION="${CHART_PARTS[0]}.${CHART_PARTS[1]}.${CHART_PARTS[2]}"
          echo "NEW_CHART_VERSION=$NEW_CHART_VERSION"

          yq -i ".version = \"${NEW_CHART_VERSION}\"" Chart.yaml
          
      - name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar -xz
          sudo mv helm-docs /usr/local/bin/

      - name: Regenerate Helm docs
        run: helm-docs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Chart.yaml README.md || true
          git commit -m "chore: update appVersion to ${{ steps.read_chart_app_version_and_update.outputs.new_app_version }}"
          git push

  release:
    needs: [ update ]
    if : ${{ inputs.no_release == false }}
    permissions:
      id-token: write
      contents: write
    uses: datafy-io/datafy-agent-helm/.github/workflows/release.yaml@test-external-update
    secrets:
      PRODUCTION_AWS_ROLE_ARN: ${{ secrets.PRODUCTION_AWS_ROLE_ARN }}
