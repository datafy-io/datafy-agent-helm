name: Test Chart

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  id-token: write
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [Sensor, AutoScaler]

    name: Test (${{ matrix.mode }})
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Add required Helm repos
        run: |
          helm repo add aws-ebs-csi-driver https://kubernetes-sigs.github.io/aws-ebs-csi-driver
          helm repo update

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.13.x'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: Run chart-testing (lint)
        run: ct lint --charts . --config .ct.yaml --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0

      - name: Apply fake EBS CSI resources
        run: kubectl apply -f scripts/helm-validation/fake-ebs-csi.yaml

      - name: Run chart-testing (install)
        id: ct_install
        run: |
          set -euo pipefail
          NS=test
          # Live snapshots every 30s while Helm waits (otherwise the log looks "stuck")
          (
            while true; do
              sleep 30
              echo "::group::Cluster snapshot (namespace $NS)"
              date -u "+%Y-%m-%dT%H:%M:%SZ"
              kubectl get pods -n "$NS" -o wide 2>/dev/null || echo "(namespace not created yet)"
              echo "--- recent events ---"
              kubectl get events -n "$NS" --sort-by=.lastTimestamp 2>/dev/null | tail -30 || true
              echo "--- agent logs (PREVIOUS = last crash → BackOff reason) ---"
              AG_PODS=$(kubectl get pods -n "$NS" -l app=datafy-agent -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
              if [ -z "${AG_PODS// }" ]; then
                echo "(no pods with label app=datafy-agent yet)"
              fi
              for p in $AG_PODS; do
                for c in $(kubectl get pod -n "$NS" "$p" -o jsonpath='{.spec.containers[*].name}' 2>/dev/null); do
                  echo ">>> $p / $c --previous"
                  if ! kubectl logs -n "$NS" "$p" -c "$c" --previous --tail=150 2>&1; then
                    echo ">>> $p / $c --current (no/failed --previous yet)"
                    kubectl logs -n "$NS" "$p" -c "$c" --tail=80 2>&1 || true
                  fi
                  echo ""
                done
              done
              echo "::endgroup::"
            done
          ) &
          WATCH_PID=$!
          cleanup() { kill "$WATCH_PID" 2>/dev/null || true; wait "$WATCH_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          ct install \
            --charts . \
            --target-branch ${{ github.event.repository.default_branch }} \
            --config .ct.yaml \
            --namespace "$NS" \
            --skip-clean-up \
            --helm-extra-set-args "--debug --create-namespace --timeout 5m --set agent.dsoUrl='wss://dso-stg.datafy.io' --set agent.token=${{ secrets.STGN_SECRET }} --set agent.mode=${{ matrix.mode }}"

      - name: Debug chart install failure
        if: failure() && steps.ct_install.outcome == 'failure'
        run: |
          set -x
          NS=test
          echo "=== helm releases in $NS ==="
          helm list -n "$NS" -a || true
          echo "=== pods ==="
          kubectl get pods -n "$NS" -o wide || true
          echo "=== events ==="
          kubectl get events -n "$NS" --sort-by=.lastTimestamp | tail -80 || true
          echo "=== pod descriptions ==="
          for p in $(kubectl get pods -n "$NS" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "----- describe pod/$p -----"
            kubectl describe pod -n "$NS" "$p" || true
          done
          echo "::group::Logs — init containers"
          for p in $(kubectl get pods -n "$NS" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            for c in $(kubectl get pod -n "$NS" "$p" -o jsonpath='{.spec.initContainers[*].name}' 2>/dev/null); do
              echo "========== $p init/$c (current) =========="
              kubectl logs -n "$NS" "$p" -c "$c" --tail=200 2>&1 || true
              echo "========== $p init/$c (--previous) =========="
              kubectl logs -n "$NS" "$p" -c "$c" --previous --tail=200 2>&1 || true
            done
          done
          echo "::endgroup::"
          echo "::group::Logs — app containers (use --previous for BackOff / crash reason)"
          for p in $(kubectl get pods -n "$NS" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            for c in $(kubectl get pod -n "$NS" "$p" -o jsonpath='{.spec.containers[*].name}' 2>/dev/null); do
              echo "========== $p / $c — CURRENT (may be empty if restarting) =========="
              kubectl logs -n "$NS" "$p" -c "$c" --tail=200 2>&1 || true
              echo "========== $p / $c — PREVIOUS (last exit; this explains BackOff) =========="
              kubectl logs -n "$NS" "$p" -c "$c" --previous --tail=200 2>&1 || true
            done
          done
          echo "::endgroup::"

      - name: Capture ct release name
        id: capture_release
        run: |
          command -v jq >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y jq)
          rel=$(helm list -n test -o json | jq -r '.[] | select(.chart | test("^datafy-agent-")) | .name' | head -n1)
          if [ -z "$rel" ]; then
            echo "No ct-installed release found in namespace test" >&2
            helm list -n test
            exit 1
          fi
          echo "Found release: $rel"
          echo "release_name=$rel" >> "$GITHUB_OUTPUT"
