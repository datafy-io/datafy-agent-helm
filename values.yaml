## @param extraLabels Labels to add to all deployed objects
##
extraLabels: {}
## @param extraAnnotations Annotations to add to all deployed objects
##
extraAnnotations: {}

## Optionally specify an array of imagePullSecrets used by all pods in this chart.
## Secrets must be manually created in the namespace.
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
## e.g:
## imagePullSecrets:
##   - myRegistryKeySecretName
##
imagePullSecrets: []

## @param extendedInstallOnSensor Enable controller/webhook-related resources
## If false, chart skips controller config, RBAC, webhook secret/config, and controller deployment/service.
##
extendedInstallOnSensor: true

## @param proxy.httpsProxy HTTPS proxy URL
## @param proxy.noProxy Comma-separated host/IP/CIDR/DNS-suffix list to bypass the proxy
##
proxy:
  httpsProxy: ""
  noProxy: ""

## @param agent.token Datafy agent token
## @param agent.mode The mode of agent to install. Valid values: "Sensor", "AutoScaler"
## @param agent.env Environment variables to add to datafy-agent daemon set
##
agent:
  token:
  mode: AutoScaler
  dsoUrl: wss://dso.datafy.io

  ## @param agent.updateStrategy Update strategy for the agent DaemonSet
  ## Ref: https://kubernetes.io/docs/tasks/manage-daemon/update-daemon-set/
  ##
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  ## @param agent.externalTokenSecret.name The name of an existing secret that contains the token
  ## @param agent.externalTokenSecret.key The key in the secret that contains the token
  externalTokenSecret:
    name:
    key:

  # @ignored
  coreMockEnabled: false
  # @ignored
  hqMockEnabled: false

  ## @param agent.affinity Affinity for pod assignment. When set, overrides the
  ## default node affinity the chart builds from the deny lists below.
  ## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ##
  affinity: {}

  # @ignored
  # Compute types the agent must never be scheduled on (applies to all modes).
  deniedComputeTypes:
    - fargate
    - auto
    - hybrid

  # @ignored
  # In AutoScaler mode, instance types the agent must not be scheduled on.
  # These are the Xen-based / previous-generation instances (no Nitro equivalent
  # matching, so they are enumerated). Nitro equivalents (e.g. i3en, i4i, m5, c5,
  # r5 and newer) are intentionally absent and remain eligible.
  autoScalerDeniedInstanceTypes:
    - m1.small
    - m1.medium
    - m1.large
    - m1.xlarge
    - m2.xlarge
    - m2.2xlarge
    - m2.4xlarge
    - m3.medium
    - m3.large
    - m3.xlarge
    - m3.2xlarge
    - m4.large
    - m4.xlarge
    - m4.2xlarge
    - m4.4xlarge
    - m4.10xlarge
    - m4.16xlarge
    - t1.micro
    - t2.nano
    - t2.micro
    - t2.small
    - t2.medium
    - t2.large
    - t2.xlarge
    - t2.2xlarge
    - c1.medium
    - c1.xlarge
    - c3.large
    - c3.xlarge
    - c3.2xlarge
    - c3.4xlarge
    - c3.8xlarge
    - c4.large
    - c4.xlarge
    - c4.2xlarge
    - c4.4xlarge
    - c4.8xlarge
    - r3.large
    - r3.xlarge
    - r3.2xlarge
    - r3.4xlarge
    - r3.8xlarge
    - r4.large
    - r4.xlarge
    - r4.2xlarge
    - r4.4xlarge
    - r4.8xlarge
    - r4.16xlarge
    - x1.16xlarge
    - x1.32xlarge
    - x1e.xlarge
    - x1e.2xlarge
    - x1e.4xlarge
    - x1e.8xlarge
    - x1e.16xlarge
    - x1e.32xlarge
    - d2.xlarge
    - d2.2xlarge
    - d2.4xlarge
    - d2.8xlarge
    - h1.2xlarge
    - h1.4xlarge
    - h1.8xlarge
    - h1.16xlarge
    - i2.xlarge
    - i2.2xlarge
    - i2.4xlarge
    - i2.8xlarge
    - i3.large
    - i3.xlarge
    - i3.2xlarge
    - i3.4xlarge
    - i3.8xlarge
    - i3.16xlarge
    - g3.4xlarge
    - g3.8xlarge
    - g3.16xlarge
    - g3s.xlarge
    - p3.2xlarge
    - p3.8xlarge
    - p3.16xlarge
  ## @param agent.nodeSelector Node labels for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  nodeSelector: {}
  ## @param agent.tolerations Tolerations for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  tolerations:
    - operator: "Exists"

  securityContext:
    privileged: true
    runAsUser: 1000
    runAsGroup: 1000

  image:
    pullPolicy: Always
    repository: public.ecr.aws/datafy-io/datafy-agent
    tag:

  serviceAccount:
    create: true
    name: datafy-agent-sa

monitor:
  probe:
    interval: 5s
    timeout: 4s
    failureThreshold: 12
    successThreshold: 2

  image:
    pullPolicy: IfNotPresent
    repository: public.ecr.aws/datafy-io/datafy-monitor
    tag:

controller:
  serviceAccountName: datafy-controller-sa
  replicas: 2

  image:
    pullPolicy: IfNotPresent
    repository: public.ecr.aws/datafy-io/datafy-controller
    tag:

  ## @param controller.readinessProbe
  ## Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes
  ##
  health:
    enabled: true
    livenessProbe:
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 2

  ## @param controller.affinity Affinity for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ##
  affinity:
  ## @param controller.nodeSelector Node labels for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  nodeSelector: {}
  ## @param controller.tolerations Tolerations for pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  tolerations:
    - operator: "Exists"

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001

ebsCsiProxy:
  image:
    pullPolicy: IfNotPresent
    repository: public.ecr.aws/datafy-io/ebs-csi-controller
    tag:

  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 40Mi
